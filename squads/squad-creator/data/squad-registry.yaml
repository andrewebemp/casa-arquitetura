# Squad Registry
# Purpose: Central registry of all squads in the AIOS ecosystem
# Usage: Load on squad-creator activation to check for duplicates
# Generated by: *refresh-registry

metadata:
  version: "1.1.0"
  last_updated: "2026-03-01"
  maintainer: "squad-creator"
  total_squads: 2
  total_agents: 7
  total_tasks: 5
  total_workflows: 1
  total_templates: 4
  total_data_files: 5

squads:
  squad-creator:
    name: Squad Creator Premium
    description: "Meta-squad que cria outros squads via mind cloning de mentes elite"
    version: "3.0.0"
    domain: meta
    agents:
      - squad-chief
      - oalanicolas
      - pedro-valerio
    path: squads/squad-creator/
    slash_commands:
      - /squad-creator/agents/squad-chief
      - /squad-creator/agents/oalanicolas
      - /squad-creator/agents/pedro-valerio

  conselho:
    name: Conselho Deliberativo
    description: "Sistema de deliberação multi-agente para análise rigorosa de decisões"
    version: "1.0.0"
    domain: decisao
    agents:
      - conselheiro-mor
      - critico-metodologico
      - advogado-do-diabo
      - sintetizador
    tasks:
      - deliberar-full
      - deliberar-quick
      - deliberar-audit
      - consultar-especialista
      - registrar-decisao
    workflows:
      - deliberacao
    templates:
      - output-critico
      - output-advogado
      - output-sintese
      - registro-decisao
    data:
      - vieses-cognitivos
      - scoring-framework
      - tipos-decisao
      - consulta-cross-squad
      - conselho-kb
    path: squads/conselho/
    slash_commands:
      - /conselho/agents/conselheiro-mor
      - /conselho/agents/critico-metodologico
      - /conselho/agents/advogado-do-diabo
      - /conselho/agents/sintetizador
    modes:
      - full (5 fases)
      - quick (3 fases)
      - audit (3 fases)
    cross_squad: true

domain_index:
  meta:
    - squad-creator
  decisao:
    - conselho

quality_references:
  - squad: conselho
    note: "Score 0-100 com 5 critérios, detecção de 12 vieses cognitivos"

conventions:
  squad_folder: "kebab-case"
  agent_files: "kebab-case.md"
  task_files: "kebab-case.md"
  config_name: "must match folder"
