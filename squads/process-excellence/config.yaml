name: process-excellence
version: 1.0.0
tested: false
updated_at: "2026-03-04"
short-title: "Process Excellence"
description: >-
  Squad de excelência em processos com 8 agentes especializados:
  Orquestrador de Processos (Geary Rummler — triagem via Matriz 9-Cell),
  Decompositor de Tarefas (David Allen/Tiago Forte — micro-tarefas para iniciantes),
  Otimizador de Processos (Taiichi Ohno/Goldratt — Lean, TOC, Six Sigma),
  Auditor de Processos (ISO 9001/COSO — aderência e riscos),
  Documentador SOP (Technical Writing — SOPs acessíveis),
  Analista de Métricas (Kaplan & Norton — KPIs e dashboards),
  Gestor de Mudança (Kotter/ADKAR — adoção humana),
  Caçador de Automação (RPA/No-Code — identificar e priorizar automações).
  Aplicável a processos de negócio, desenvolvimento, e vida pessoal.
author: AIOS Team
entry_agent: orquestrador-de-processos
slashPrefix: processExcellence

settings:
  activation:
    show_ecosystem_report: false
    show_greeting: true
    show_quick_commands: true

modes:
