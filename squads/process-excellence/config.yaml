    description: "Ciclo completo: mapear → analisar → redesenhar → planejar → entregar"
  rapida:
    phases: 3
    description: "Melhoria rápida: diagnosticar → propor → documentar"
  decomposicao:
    phases: 2
    description: "Decomposição pura: entender → quebrar em micro-tarefas"
  direto:
    phases: 1
    description: "Comando direto a um agente específico"

