# ═══════════════════════════════════════════════════════════════
# CHECKLIST DE QUALIDADE POR FASE
# ═══════════════════════════════════════════════════════════════

quality_checklist:
  Mapeamento:
    - "[ ] Fluxo completo mapeado do inicio ao fim (incluindo excecoes)"
    - "[ ] Todos os atores e sistemas identificados com responsabilidades"
    - "[ ] Tempos medios registrados por etapa"
    - "[ ] Volumes e frequencias documentados"
    - "[ ] Pontos de dor identificados e priorizados"
    - "[ ] Diagrama visual do fluxo criado"
    - "[ ] Baseline de metricas definido com KPIs SMART"
  Analise:
    - "[ ] Score de aderencia calculado com metodologia explicita"
    - "[ ] Desvios classificados por severidade (critico/maior/menor)"
    - "[ ] Desperdicios TIMWOODS identificados com evidencia"
    - "[ ] Gargalo principal identificado via TOC"
    - "[ ] Analise de valor agregado por etapa"
    - "[ ] Automacoes mapeadas com tipo, viabilidade e ROI"
    - "[ ] Diagnostico consolidado integrando 3 perspectivas"
  Redesenho:
    - "[ ] Processo TO-BE desenhado com justificativa por mudanca"
    - "[ ] Impacto quantificado (AS-IS vs TO-BE)"
    - "[ ] Melhorias priorizadas pela matriz impacto x esforco"
    - "[ ] Automacoes detalhadas com especificacao tecnica"
    - "[ ] Micro-tarefas criadas com passo-a-passo para iniciante"
    - "[ ] Dependencias mapeadas e caminho critico identificado"
  Planejamento:
    - "[ ] Stakeholders mapeados (patrocinadores, impactados, resistentes)"
    - "[ ] Comunicacao planejada e segmentada por publico"
    - "[ ] Treinamento definido (conteudo, formato, cronograma)"
    - "[ ] Rollout planejado (piloto/faseado/big bang)"
    - "[ ] SOPs criadas com troubleshooting e FAQ"
    - "[ ] Metas progressivas definidas (30/60/90 dias)"
    - "[ ] Dashboard proposto com rituais de revisao"
  Entrega:
    - "[ ] Todos os artefatos consolidados e coerentes"
    - "[ ] Resumo executivo com linguagem acessivel"
    - "[ ] Indice completo dos documentos"
    - "[ ] Proximos passos imediatos definidos"

# ═══════════════════════════════════════════════════════════════
# METADATA
# ═══════════════════════════════════════════════════════════════

metadata:
  version: "1.0.0"
  framework: "Rummler-Brache + Lean + TOC + Kotter/ADKAR"
  created: "2026-03-04"
  squad: "process-excellence"
  total_agents: 8
  total_tasks: 10
  total_phases: 5
  estimated_artifacts: 11

# ═══════════════════════════════════════════════════════════════
# TRATAMENTO DE ERROS
# ═══════════════════════════════════════════════════════════════

error_handling:
  on_phase_failure:
    - log_error: true
    - halt_workflow: true
    - notify_user: true
    - message: "Fase falhou. Revise o erro e decida se deseja repetir ou pular."
  on_checkpoint_failure:
    - return_to_previous_phase: false
    - max_retries: 2
    - escalate_to_user: true
    - message: "Checkpoint nao passou. Ajustes necessarios antes de prosseguir."
  on_task_failure:
    - log_error: true
    - continue_phase: false
    - notify_user: true
    - message: "Task falhou. Verifique se o input estava correto e tente novamente."
  on_missing_input:
    - action: "Solicitar informacao ao usuario antes de prosseguir"
    - fallback: "Registrar premissa e continuar com estimativa (sinalizar incerteza)"

# ═══════════════════════════════════════════════════════════════
# MODOS ALTERNATIVOS (EXECUCAO PARCIAL)
# ═══════════════════════════════════════════════════════════════

partial_modes:
  diagnostico_apenas:
    phases: ["FASE-1", "FASE-2"]
    description: "Apenas mapeamento e diagnostico, sem redesenho ou planejamento"
    duration: "2-4 horas"
    use_when: "Precisa entender o estado atual antes de decidir agir"
  sem_mudanca:
    phases: ["FASE-1", "FASE-2", "FASE-3"]
    description: "Mapeamento, diagnostico e redesenho, sem plano de mudanca"
    duration: "3-6 horas"
    use_when: "Ja tem equipe de mudanca ou processo e pessoal"
  sem_auditoria:
    phases: ["FASE-1", "FASE-3", "FASE-4", "FASE-5"]
    skip_tasks: ["auditar-processo.md"]
    description: "Ciclo completo sem fase de auditoria formal"
    duration: "3-6 horas"
    use_when: "Processo novo ou sem padrao de referencia para auditar"
